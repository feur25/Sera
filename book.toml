[book]
title = "SeraPlot Documentation"
authors = ["SeraPlot Team"]
description = "High-performance data visualization — Rust/Python"
src = "docs"
language = "en"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
additional-css = ["docs/theme/custom.css"]
additional-js = ["docs/theme/lang-switcher.js", "docs/theme/donate-popup.js", "docs/theme/doc-registry.js", "docs/theme/ml-registry.js", "docs/theme/ml-docs.js", "docs/theme/params-panel.js", "docs/theme/wip-notice.js", "docs/theme/variant-pager.js", "docs/theme/seraplot-web.20260720.js", "docs/theme/playground.js", "docs/theme/showcase.js"]
mathjax-support = true
git-repository-url = "https://github.com/feur25/seraplot"
edit-url-template = "https://github.com/feur25/seraplot/edit/main/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
