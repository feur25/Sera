[book]
title = "SeraPlot Documentation"
authors = ["SeraPlot Team"]
description = "High-performance data visualization — Rust/Python"
src = "docs"
language = "en"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
theme = "docs/theme"
additional-css = ["docs/theme/css/core/custom.css", "docs/theme/css/chart-tabs.css", "docs/theme/css/pages/support.css", "docs/theme/css/pages/themes.css", "docs/theme/css/pages/showcase.css", "docs/theme/css/pages/chart-methods.css", "docs/theme/css/pages/playground.css", "docs/theme/css/pages/vscode.css"]
additional-js = ["docs/theme/js/lang-switcher.js", "docs/theme/js/donate-popup.js", "docs/theme/js/doc-registry.js", "docs/theme/js/ml-registry.js", "docs/theme/js/ml-docs.js", "docs/theme/js/params-panel.js", "docs/theme/js/wip-notice.js", "docs/theme/js/variant-pager.js", "docs/theme/wasm/seraplot-web.20260720.js", "docs/theme/js/playground.js", "docs/theme/js/showcase.js"]
mathjax-support = true
git-repository-url = "https://github.com/feur25/seraplot"
edit-url-template = "https://github.com/feur25/seraplot/edit/main/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
