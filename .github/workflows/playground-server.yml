name: Playground Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

permissions:
  contents: write

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install seraplot websockets

      - name: Download cloudflared
        run: |
          curl -sSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start server
        run: HOST=0.0.0.0 PORT=7842 python playground_server.py &

      - name: Start tunnel and publish URL
        run: |
          ./cloudflared tunnel --url http://localhost:7842 2>&1 | tee /tmp/cf.log &
          for i in $(seq 1 20); do
            CF_HTTPS=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            [ -n "$CF_HTTPS" ] && break
            sleep 2
          done
          if [ -z "$CF_HTTPS" ]; then
            echo "Tunnel URL not found"; cat /tmp/cf.log; exit 1
          fi
          WS_URL="wss://${CF_HTTPS#https://}"
          echo "{\"url\":\"$WS_URL\",\"ts\":$(date +%s)}" > playground-url.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playground-url.json
          git commit -m "chore: playground url [skip ci]"
          git pull --rebase && git push

      - name: Keep alive
        run: sleep 20100

      - name: Mark offline
        if: always()
        run: |
          echo '{"url":"","ts":0}' > playground-url.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playground-url.json
          git commit -m "chore: playground offline [skip ci]" || true
          git pull --rebase && git push || true
