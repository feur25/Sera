name: Telemetry Ingest

on:
  repository_dispatch:
    types: [seraplot-telemetry]

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append telemetry events
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          mkdir -p telemetry
          python3 << 'PYEOF'
          import os, json, csv, sys
          payload_str = os.environ.get("PAYLOAD", "{}")
          try:
              payload = json.loads(payload_str)
              events = payload.get("events", [])
              if not events:
                  print("No events found in payload")
                  sys.exit(0)
              csv_path = "telemetry/data.csv"
              file_exists = os.path.exists(csv_path)
              fieldnames = ["ts", "method", "duration_ms", "version", "os", "arch", "cpu_count", "ram_gb", "available_ram_gb", "cpu_brand", "python_version", "data_count", "data_size_mb", "input_shape", "output_shape", "algorithm"]
              with open(csv_path, "a", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames, extrasaction="ignore")
                  if not file_exists:
                      writer.writeheader()
                  for ev in events:
                      writer.writerow({k: ev.get(k, "") for k in fieldnames})
              print(f"Appended {len(events)} events to CSV")
          except json.JSONDecodeError as e:
              print(f"Error parsing payload: {e}")
              print(f"Payload was: {payload_str[:200]}")
              sys.exit(1)
          PYEOF

      - name: Commit telemetry data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telemetry/data.csv
          git diff --cached --quiet || git commit -m "telemetry: append events [skip ci]"
          git push
