name: Telemetry Ingest

on:
  repository_dispatch:
    types: [seraplot-telemetry]

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append telemetry events
        run: |
          mkdir -p telemetry
          PAYLOAD='${{ toJson(github.event.client_payload) }}'
          echo "$PAYLOAD" | python3 - << 'PYEOF'
          import sys, json, csv, os
          raw = sys.stdin.read()
          payload = json.loads(raw)
          events = payload.get("events", [])
          csv_path = "telemetry/data.csv"
          file_exists = os.path.exists(csv_path)
          fieldnames = ["ts", "method", "duration_ms", "version", "os", "cpu_count", "ram_gb", "cpu_brand"]
          with open(csv_path, "a", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames, extrasaction="ignore")
              if not file_exists:
                  writer.writeheader()
              for ev in events:
                  writer.writerow({k: ev.get(k, "") for k in fieldnames})
          PYEOF

      - name: Commit telemetry data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telemetry/data.csv
          git diff --cached --quiet || git commit -m "telemetry: append events [skip ci]"
          git push
