name: Deploy mdBook

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  MDBOOK_VERSION: 0.4.51
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook (pre-built binary)
        run: |
          set -e
          MDBOOK_URL="https://github.com/rust-lang/mdBook/releases/download/v${{ env.MDBOOK_VERSION }}/mdbook-v${{ env.MDBOOK_VERSION }}-x86_64-unknown-linux-gnu.tar.gz"
          echo "Downloading from: $MDBOOK_URL"
          curl -sSL -f "$MDBOOK_URL" -o /tmp/mdbook.tar.gz
          tar xzf /tmp/mdbook.tar.gz -C /tmp/
          mv /tmp/mdbook /usr/local/bin/
          chmod +x /usr/local/bin/mdbook
          mdbook --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Build tools
        run: cargo build --release --manifest-path tools/Cargo.toml

      - name: Install SeraPlot (optional — previews skipped if unavailable)
        run: pip install seraplot==2.3.47 || echo "seraplot not on PyPI — chart previews will be skipped"

      - name: Generate chart previews
        run: ./tools/target/release/gen_previews

      - name: Generate API index
        run: ./tools/target/release/gen_index

      - name: Check for docs changes
        id: check_changes
        run: |
          if git diff --quiet src/docs/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit docs changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/docs/
          git diff --cached --quiet || git commit -m "docs: regenerate previews and index"
          git push

      - name: Build docs
        run: mdbook build -d book/html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify build output
        run: |
          if [ ! -d "book/html" ]; then
            echo "ERROR: book/html directory was not created"
            exit 1
          fi
          if [ ! -f "book/html/index.html" ]; then
            echo "ERROR: book/html/index.html was not created"
            ls -la book/
            exit 1
          fi
          echo "Build output verified: $(du -sh book/html)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4