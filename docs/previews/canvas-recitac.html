<script>(function(){var root=document.getElementById('sp-canvas-root');if(!root)return;var aG=null;function qL(g){return root.querySelectorAll('.sp-hvl[data-sp-grp="'+g+'"]');}function qA(g){return root.querySelectorAll('.sp-anch[data-sp-grp="'+g+'"]');}function qS(g){return root.querySelectorAll('div[data-sp-grp="'+g+'"],rect[data-sp-grp="'+g+'"],text[data-sp-grp="'+g+'"]');}function act(g){if(aG===g)return;if(aG)deact(aG);aG=g;qL(g).forEach(function(l){var c=l.getAttribute('stroke')||'#6366f1';l.style.filter='drop-shadow(0 0 4px '+c+') drop-shadow(0 0 10px '+c+'80)';l.setAttribute('stroke-opacity','1');l.setAttribute('stroke-width',String(parseFloat(l.getAttribute('data-sw')||'1.2')*2.2));});qA(g).forEach(function(c){var col=c.getAttribute('fill')||'#6366f1';c.setAttribute('r',String(parseFloat(c.getAttribute('data-r')||'5')*1.9));c.style.filter='drop-shadow(0 0 6px '+col+') drop-shadow(0 0 16px '+col+'60)';});qS(g).forEach(function(d){d.style.animation='sp-sat-pulse 1.4s ease-in-out infinite';d.style.transformOrigin='center center';d.style.transformBox='fill-box';});}function deact(g){if(!g)return;aG=null;qL(g).forEach(function(l){l.style.filter='';l.setAttribute('stroke-opacity',l.getAttribute('data-op')||'0.29');l.setAttribute('stroke-width',l.getAttribute('data-sw')||'1.2');});qA(g).forEach(function(c){c.setAttribute('r',c.getAttribute('data-r')||'5');c.style.filter='';});qS(g).forEach(function(d){d.style.animation='';});}root.querySelectorAll('.sp-hvh,div[data-sp-grp],rect[data-sp-grp],text[data-sp-grp],circle.sp-anch[data-sp-grp]').forEach(function(hit){var g=hit.getAttribute('data-sp-grp');if(!g)return;hit.style.cursor='pointer';hit.addEventListener('mouseenter',function(){act(g);});hit.addEventListener('mouseleave',function(e){var rt=e.relatedTarget;if(!rt||!rt.closest||!rt.closest('[data-sp-grp="'+g+'"]')){deact(g);}});});})();</script>
